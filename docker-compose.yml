services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gunawan-portfolio
    ports:
      - "3010:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development mode with hot reload
  portfolio-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gunawan-portfolio-dev
    ports:
      - "3010:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    command: npm run dev
